<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Three Body</title>
		<link href="src/style.css" rel="stylesheet">
	</head>
	<body>
		<div id="begin">
			<h2>&lt;three-body&gt; v__APP_VERSION__</h2>
			<p>(click to enter)</p>
		</div>
		<div id="control-panel">
			<div>Controls</div>
			<span class="l">toggles: </span>
			<span id="b-s" class="b">sim</span><span class="l"> </span>
			<span id="b-t" class="b">trails</span><span class="l"> </span>
			<span id="b-o" class="b">objects</span><span class="l"> </span>
			<span id="b-b" class="b">background</span><span class="l"> </span><br>
			<span class="l">tools: </span>
			<span id="b-tm" class="b">test mass</span><span class="l"> </span>
			<span id="b-ps" class="b">parameter setter</span><span class="l"> </span><br>
			<span class="l">fly mode: </span><span class="b">F</span><span class="l"> (arrow keys, Shift/Enter)</span><br>
			<span class="l">simulation: </span>
			<span id="b-step" class="b">step</span><span class="l"> </span>
			<span id="b-reset" class="b">reset</span><span class="l"> </span><br>
			<span class="l">presets: </span>
			<span id="b-lagrange" class="b">Lagrange</span><span class="l"> </span>
			<span id="b-figure8" class="b">Figure-8</span><span class="l"> </span><br>
			<div id="setter">
				<hr>
				<div>Parameter Setter</div>
				<div class="slider-wrap"></div>
			</div>
			<hr>
			<div id="stats"></div>
			<div id="phys-stats"></div>
		</div>
		<script src="src/main.js" type="module"></script>
	</body>
</html>
